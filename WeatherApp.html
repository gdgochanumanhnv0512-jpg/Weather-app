<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="browser.js"></script>
        <title>Weather App</title>
    </head>
    <body class="bg-contain bg-no-repeat bg-center bg-[url(background.jpg)] ">
      <div >
      <form class="flex items-center justify-center">
        <input type="text" id="cityInput" placeholder="Type the city" class="rounded-xl">
        <button type="submit" id="button" class="bg-red-300 rounded-lg" >Go on</button>
      </form>
     </div>
    <div>
      <div>
    <h1 class="text-center mt-5 pb-5 text-4xl text-orange-400" id="temperature" ></h1>
    <h2 class="text-center pb-5 font-bold text-red-300 text-2xl" id="city"></h2>
    <p class="text-center pb-5 font-bold text-xl" id="humidity"></p>
    <p class="text-center pb-5 font-bold italic text-xl" id="windspeed"></p>
   <p class="text-center pb-5 text-4xl">🌤🌞</p>
      </div>
    </div>
  </body>
</html>
